<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>나만의 귀여운 웹툰 제작실</title>
  
  <style>
    /* 워드프레스 스타일 모던/큐트 테마 유지 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f8fafc; 
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #334155;
      display: flex;
      flex-direction: column;
    }

    #main-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      height: 100%;
      box-sizing: border-box;
      background-color: #ffffff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    #control-panel {
      width: 100%;
      box-sizing: border-box;
      padding: 24px;
      background-color: #ffffff;
      border-bottom: 2px dashed #e2e8f0;
      overflow-y: auto;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .panel-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #0f172a;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-toggle-setup {
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #cbd5e1;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .input-row {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #334155;
    }

    .input-control {
      width: 100%;
      background: #f8fafc;
      color: #1e293b;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px;
      box-sizing: border-box;
      font-size: 0.95rem;
    }

    .input-control:focus {
      outline: none;
      border-color: #fbbf24;
      background: #fff;
    }

    textarea.input-control {
      height: 80px;
      resize: none;
      line-height: 1.5;
    }

    #model-selectors {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      display: none;
    }
    
    .model-select-label {
      font-size: 0.8rem;
      color: #2563eb;
      font-weight: 700;
      margin-bottom: 4px;
      display: block;
    }

    .character-card {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
    }
    
    .character-card-title {
      font-size: 0.95rem;
      font-weight: 800;
      color: #0f172a;
      margin-top: 0;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .char-input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-add-char {
      background: transparent;
      color: #3b82f6;
      border: 2px dashed #93c5fd;
      padding: 12px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-bottom: 16px;
    }
    
    .btn-suggest-episode {
      background: #ede9fe;
      color: #6d28d9;
      border: 1px solid #c4b5fd;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-submit {
      background: #fbbf24;
      color: #78350f;
      font-weight: 800;
      border: none;
      padding: 16px;
      border-radius: 16px;
      cursor: pointer;
      width: 100%;
      font-size: 1.1rem;
      box-shadow: 0 4px 0 #d97706;
    }

    .btn-submit:active {
      transform: translateY(4px);
      box-shadow: none;
    }

    #canvas-area {
      flex: 1;
      padding: 24px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-y: auto;
      background-color: #f8fafc;
    }

    .status-text {
      font-size: 0.95rem;
      color: #64748b;
      text-align: center;
      line-height: 1.6;
      padding: 20px;
      background: #ffffff;
      border-radius: 16px;
      border: 2px dashed #cbd5e1;
      width: 100%;
      box-sizing: border-box;
    }

    .webtoon-card {
      width: 100%;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 16px;
      box-sizing: border-box;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }

    /* 다중 컷을 담을 컨테이너 */
    #webtoon-panels-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #e2e8f0;
      margin-bottom: 16px;
      background: #f1f5f9;
    }

    .webtoon-panel {
      width: 100%;
      height: auto;
      display: block;
      border-bottom: 2px solid #e2e8f0;
    }
    
    .webtoon-panel:last-child {
      border-bottom: none;
    }

    .btn-download {
      background: #3b82f6;
      color: #ffffff;
      font-weight: 800;
      border: none;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 4px 0 #2563eb;
    }

    .btn-download:active {
      transform: translateY(4px);
      box-shadow: none;
    }

    .prompt-box {
      background: #f1f5f9;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      color: #475569;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-all;
      margin-top: 8px;
      border: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>

  <div id="main-container">
    <div id="control-panel">
      <div class="panel-header">
        <div class="panel-title">🎨 AI 귀염 웹툰 스튜디오</div>
        <button id="toggle-btn" class="btn-toggle-setup" onclick="toggleSetupSection()" style="display: none;">⚙️ 설정 펴기</button>
      </div>
      
      <div class="input-row">
        <div id="setup-section">
          
          <div class="input-group" style="margin-bottom: 16px;">
            <label for="api-key">🔑 Gemini API Key (무료 기획용)</label>
            <div style="display: flex; gap: 8px;">
              <input type="password" id="api-key" class="input-control" placeholder="AI Studio 키 입력" style="flex: 1;">
              <button class="btn-toggle-setup" style="padding: 0 16px; border-radius: 12px; background: #3b82f6; color: #fff; font-weight: 800; border: none;" onclick="loadModels()">연동🔄</button>
            </div>
          </div>

          <div id="model-selectors">
            <span style="font-size: 0.85rem; font-weight: bold; color: #1e3a8a; margin-bottom: 12px; display: block;">✅ 기획 전용 AI 연동 완료</span>
            <label class="model-select-label">기획/분석용 텍스트 모델</label>
            <select id="text-model" class="input-control" style="margin-bottom: 4px; padding: 8px; font-size: 0.85rem;"></select>
          </div>

          <div id="character-list">
            <div class="character-card" data-index="1">
              <h4 class="character-card-title">👤 캐릭터 1</h4>
              <input type="file" class="input-control char-img" accept="image/*" style="margin-bottom: 8px;">
              <div class="char-input-grid">
                <input type="text" class="input-control char-name" placeholder="이름 (예: 사각이)" value="사각이">
                <input type="text" class="input-control char-traits" placeholder="특징 (예: 귀여움, 활발함)">
              </div>
            </div>
          </div>
          
          <button class="btn-add-char" onclick="addCharacter()">+ 캐릭터 추가하기</button>
        </div>

        <div class="input-group">
          <label for="scene-text">📝 만들고 싶은 에피소드 장면</label>
          <button class="btn-suggest-episode" onclick="suggestEpisode()">
            💡 AI에게 짧은 에피소드 아이디어 추천받기
          </button>
          <textarea id="scene-text" class="input-control" placeholder="직접 입력하거나 위 추천 버튼을 눌러보세요!"></textarea>
        </div>

        <!-- [신규] 컷 수 지정 & 그림체 선택 -->
        <div class="char-input-grid" style="margin-bottom: 8px;">
          <div>
            <label style="font-size: 0.85rem; font-weight: 700; color: #334155; margin-bottom: 6px; display: block;">🎬 컷 수 (분량)</label>
            <select id="panel-count" class="input-control" style="padding: 10px;">
              <option value="1">1컷 (단일 일러스트)</option>
              <option value="2">2컷 (짧은 상황)</option>
              <option value="3">3컷 (기승전)</option>
              <option value="4" selected>4컷 만화 (기승전결)</option>
            </select>
          </div>
          <div>
            <label style="font-size: 0.85rem; font-weight: 700; color: #334155; margin-bottom: 6px; display: block;">🖌️ 그림체 (화풍)</label>
            <select id="art-style" class="input-control" style="padding: 10px;">
              <option value="flat color webtoon style, comic panel, masterpiece, extremely cute, clear lines">기본 웹툰 (깔끔/단색)</option>
              <option value="japanese anime style, studio ghibli, vivid and warm colors, detailed background">일본 애니메이션풍</option>
              <option value="watercolor painting style, soft, emotional, fairy tale illustration">부드러운 수채화톤</option>
              <option value="black and white manga style, screentone, ink pen, dynamic">흑백 출판 만화풍</option>
              <option value="american comic book style, bold lines, vibrant retro colors, pop art">아메리칸 코믹스풍</option>
            </select>
          </div>
        </div>

      </div>

      <button class="btn-submit" onclick="startWebtoonPipeline()">✨ 일관성 만화 생성하기</button>
    </div>

    <div id="canvas-area">
      <div id="status-viewer" class="status-text">
        1. API 키를 넣고 <strong>[연동🔄]</strong> 버튼을 누르세요.<br>
        2. 캐릭터 사진과 특징을 채우세요.<br>
        3. 컷 수와 그림체를 고른 뒤 <strong>[만화 생성하기]</strong> 버튼을 누르세요!
      </div>
      
      <div id="webtoon-result-card" class="webtoon-card" style="display: none;">
        <!-- 생성된 여러 컷이 일렬로 들어갈 컨테이너 -->
        <div id="webtoon-panels-container"></div>
        
        <button class="btn-download" onclick="downloadWebtoon()">
          ⬇️ 만들어진 컷 모두 갤러리에 저장하기
        </button>

        <div style="font-size: 0.9rem; font-weight: 800; color: #334155; text-align: left;">🤖 에피소드 프롬프트 구조 :</div>
        <div id="result-prompt" class="prompt-box"></div>
      </div>
    </div>
  </div>

  <script>
    let charCount = 1;
    window.currentImageUrls = []; // 다중 컷 다운로드를 위한 배열

    window.onload = function() {
      const savedKey = localStorage.getItem('gemini_free_api_key');
      if (savedKey) {
        document.getElementById('api-key').value = savedKey;
        loadModels(true);
      }
    };

    function addCharacter() {
      charCount++;
      const list = document.getElementById('character-list');
      const card = document.createElement('div');
      card.className = 'character-card';
      card.setAttribute('data-index', charCount);
      card.innerHTML = `
        <h4 class="character-card-title">👤 캐릭터 ${charCount}</h4>
        <input type="file" class="input-control char-img" accept="image/*" style="margin-bottom: 8px;">
        <div class="char-input-grid">
          <input type="text" class="input-control char-name" placeholder="이름">
          <input type="text" class="input-control char-traits" placeholder="특징">
        </div>
      `;
      list.appendChild(card);
    }

    function toggleSetupSection() {
      const setupSection = document.getElementById('setup-section');
      setupSection.style.display = (setupSection.style.display === "none") ? "block" : "none";
    }

    // 여러 장의 이미지를 순차적으로 다운로드하도록 개선
    function downloadWebtoon() {
      if (!window.currentImageUrls || window.currentImageUrls.length === 0) return;
      window.currentImageUrls.forEach((url, index) => {
        setTimeout(() => {
          const a = document.createElement('a');
          a.href = url;
          a.download = `Webtoon_Panel_${index + 1}_${new Date().getTime()}.jpg`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        }, index * 400); // 브라우저 차단을 막기 위한 0.4초 딜레이
      });
    }

    function fileToGenerativePart(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => {
          try {
            const base64Data = reader.result.split(',')[1];
            if (!base64Data) throw new Error("이미지 변환 실패");
            resolve({ inlineData: { data: base64Data, mimeType: file.type } });
          } catch (e) {
            reject(e);
          }
        };
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
      });
    }

    function getCharactersData() {
      const cards = document.querySelectorAll('.character-card');
      let chars = [];
      cards.forEach(card => {
        const fileInput = card.querySelector('.char-img');
        const name = card.querySelector('.char-name').value.trim();
        const traits = card.querySelector('.char-traits').value.trim();
        
        if (name || traits || (fileInput.files && fileInput.files.length > 0)) {
          chars.push({
            file: (fileInput.files && fileInput.files.length > 0) ? fileInput.files[0] : null,
            name: name || "이름 미상",
            traits: traits || "특징 없음"
          });
        }
      });
      return chars;
    }

    async function loadModels(silent = false) {
      const apiKey = document.getElementById('api-key').value.trim();
      if (!apiKey) {
        if (!silent) alert("API 키를 먼저 입력해주세요!");
        return false;
      }
      
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
        const data = await res.json();
        
        if (data.error) throw new Error(data.error.message);
        
        const textSelect = document.getElementById('text-model');
        textSelect.innerHTML = "";
        
        const validText = data.models.filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent"));
        
        validText.forEach(m => {
          let opt = document.createElement('option');
          opt.value = m.name; opt.text = m.displayName || m.name;
          textSelect.appendChild(opt);
        });
        
        let defaultText = validText.find(m => m.name.includes("flash")) || validText[0];
        if(defaultText) textSelect.value = defaultText.name;

        document.getElementById('model-selectors').style.display = "block";
        localStorage.setItem('gemini_free_api_key', apiKey);
        
        if (!silent) alert("✅ 구글 기획 AI 모델 연동 완료!");
        return true;
      } catch (error) {
        if (!silent) alert("연동 실패: " + error.message);
        return false;
      }
    }

    async function suggestEpisode() {
      const apiKeyInput = document.getElementById('api-key').value.trim();
      const textModelName = document.getElementById('text-model').value;
      const chars = getCharactersData();
      const panelCount = document.getElementById('panel-count').value;
      
      if (!apiKeyInput) { alert("먼저 Gemini API Key를 입력해주세요!"); return; }
      if (!textModelName) { 
        alert("선택된 AI 모델이 없습니다. [연동🔄] 버튼을 눌러주세요."); 
        await loadModels(); 
        return; 
      }
      if (chars.length === 0) { alert("최소 1명 이상의 캐릭터 이름과 특징을 적어주세요!"); return; }

      const sceneBox = document.getElementById('scene-text');
      sceneBox.value = "구글 AI가 기승전결 스토리를 상상하고 있습니다...";

      try {
        let charDescriptions = chars.map(c => `- ${c.name} (특징: ${c.traits})`).join("\n");
        const promptText = `다음 캐릭터 설정을 바탕으로, 귀엽고 명랑한 짧은 에피소드 스토리를 1개 추천해줘. 구구절절한 설명 없이 ${panelCount}컷 분량에 어울리도록 상황만 짧게 출력해.\n\n[등장인물]\n${charDescriptions}`;

        const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/${textModelName}:generateContent?key=${apiKeyInput}`;
        
        const response = await fetch(geminiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        });
        
        const data = await response.json();
        if (data.error) throw new Error(data.error.message);
        
        sceneBox.value = data.candidates[0].content.parts[0].text.trim();
      } catch (error) {
        sceneBox.value = "";
        alert("에피소드 추천 실패: " + error.message);
      }
    }

    async function startWebtoonPipeline() {
      const apiKeyInput = document.getElementById('api-key').value.trim();
      const textModelName = document.getElementById('text-model').value;
      const sceneText = document.getElementById('scene-text').value.trim();
      const panelCount = parseInt(document.getElementById('panel-count').value);
      const artStyle = document.getElementById('art-style').value;
      
      const statusViewer = document.getElementById('status-viewer');
      const resultCard = document.getElementById('webtoon-result-card');
      const panelsContainer = document.getElementById('webtoon-panels-container');
      const resultPrompt = document.getElementById('result-prompt');
      const setupSection = document.getElementById('setup-section');
      const toggleBtn = document.getElementById('toggle-btn');
      
      const chars = getCharactersData();
      const charsWithImages = chars.filter(c => c.file !== null);

      if (!apiKeyInput) { alert("Gemini API Key를 입력해주세요!"); return; }
      if (!textModelName) { alert("모델 연동이 안 되어 있습니다. 상단 [연동🔄] 버튼을 눌러주세요."); return; }
      if (charsWithImages.length === 0) { alert("최소 1개 이상의 캐릭터 이미지를 첨부해주세요!"); return; }
      if (!sceneText) { alert("에피소드 장면 묘사를 적어주세요!"); return; }

      localStorage.setItem('gemini_free_api_key', apiKeyInput);
      
      setupSection.style.display = "none";
      toggleBtn.style.display = "block";
      
      resultCard.style.display = "none";
      statusViewer.style.display = "block";
      statusViewer.innerHTML = `⏳ <strong>[1/2 단계]</strong> 구글 Gemini가 ${panelCount}컷 스토리보드를 짜고 있습니다...`;

      try {
        let partsForGemini = [];
        
        for (let i = 0; i < charsWithImages.length; i++) {
          const char = charsWithImages[i];
          const imagePart = await fileToGenerativePart(char.file);
          partsForGemini.push({ text: `[등장인물 ${i+1}] 이름: ${char.name}, 성격 및 외형 특징: ${char.traits}` });
          partsForGemini.push(imagePart);
        }

        // [중요 로직] 여러 컷의 일관성을 유지하며 프롬프트를 분할 추출하기 위한 JSON 형태 지시
        partsForGemini.push({ text: `당신은 웹툰 기획자입니다. 위 캐릭터들이 등장하는 다음 스토리("${sceneText}")를 총 ${panelCount}개의 만화 컷(Panel)으로 분할 연출하세요.
        
        [필수 규칙]
        1. 반드시 아래의 JSON 배열(Array of strings) 형태로만 응답하세요. 다른 부연 설명이나 마크다운 텍스트는 절대 출력하지 마세요.
        2. 캐릭터의 외형 특징과 복장은 일관성을 위해 "모든 컷"의 프롬프트에 반복해서 포함해야 합니다.
        3. 각 프롬프트는 이미지 생성을 위한 고품질의 영문 프롬프트여야 합니다.
        
        형식 예시: ["panel 1 description in english...", "panel 2 description in english...", ...]` });

        const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/${textModelName}:generateContent?key=${apiKeyInput}`;
        
        const geminiPayload = { contents: [{ parts: partsForGemini }] };

        const geminiResponse = await fetch(geminiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(geminiPayload)
        });
        
        const geminiData = await geminiResponse.json();
        
        if (geminiData.error) throw new Error(`[Gemini 기획 오류] ${geminiData.error.message}`);
        if (!geminiData.candidates) throw new Error("스토리보드 기획에 실패했습니다.");

        let jsonText = geminiData.candidates[0].content.parts[0].text.trim();
        // 불필요한 마크다운 백틱 제거
        jsonText = jsonText.replace(/^```json/i, '').replace(/```$/i, '').trim();
        
        let promptsArray = [];
        try {
          promptsArray = JSON.parse(jsonText);
        } catch(e) {
          throw new Error("AI가 컷 분할을 올바른 형식으로 기획하지 못했습니다. 다시 시도해주세요.");
        }

        // 💡 2단계: 여러 컷을 순차적으로 렌더링
        statusViewer.innerHTML = `🎨 <strong>[2/2 단계]</strong> 기획된 ${panelCount}컷을 선택한 화풍으로 그리고 있습니다... (조금만 기다려주세요!)`;
        
        panelsContainer.innerHTML = ''; // 기존 이미지 초기화
        window.currentImageUrls = [];
        
        // 일관성 강화를 위해 한 에피소드 안에서는 동일한 난수 시드 배정
        const globalSeed = Math.floor(Math.random() * 1000000); 

        for(let i = 0; i < promptsArray.length; i++) {
          // 캐릭터 외형 프롬프트 + 유저가 선택한 그림체 결합
          const enhancedPrompt = `${promptsArray[i]}, ${artStyle}`;
          
          // Pollinations.ai 엔진 다이렉트 호출 (시드값 통일로 일관성 향상)
          const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(enhancedPrompt)}?width=1024&height=1024&nologo=true&seed=${globalSeed}`;
          
          const imgResponse = await fetch(imgUrl);
          if (!imgResponse.ok) throw new Error(`컷 ${i+1} 렌더링 중 통신 문제가 발생했습니다.`);
          
          const imageBlob = await imgResponse.blob();
          const objectURL = URL.createObjectURL(imageBlob);
          window.currentImageUrls.push(objectURL);

          // 화면에 컷 추가
          const imgEl = document.createElement('img');
          imgEl.src = objectURL;
          imgEl.className = 'webtoon-panel';
          panelsContainer.appendChild(imgEl);
        }

        statusViewer.style.display = "none";
        resultCard.style.display = "block";
        resultPrompt.innerText = JSON.stringify(promptsArray, null, 2);

      } catch (error) {
        statusViewer.innerHTML = `<span style="color:#ef4444; font-weight:800;">❌ 에러 발생</span><br><br><small style="color:#64748b;">${error.message}</small>`;
        setupSection.style.display = "block";
        toggleBtn.style.display = "none";
      }
    }
  </script>
</body>
</html>
