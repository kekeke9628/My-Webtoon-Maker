<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>나만의 귀여운 웹툰 제작실</title>
  
  <style>
    /* 워드프레스 스타일의 모던/큐트 라이트 모드 테마 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f8fafc; /* 부드러운 라이트 블루/그레이 배경 */
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #334155;
      display: flex;
      flex-direction: column;
    }

    #main-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 600px;
      margin: 0 auto; /* 모바일/PC 중앙 정렬 */
      height: 100%;
      box-sizing: border-box;
      background-color: #ffffff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    /* 상단 헤더 및 제어 패널 */
    #control-panel {
      width: 100%;
      box-sizing: border-box;
      padding: 24px;
      background-color: #ffffff;
      border-bottom: 2px dashed #e2e8f0;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .panel-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #0f172a;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-toggle-setup {
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #cbd5e1;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-toggle-setup:hover {
      background: #e2e8f0;
    }

    .input-row {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #334155;
    }

    .input-control {
      width: 100%;
      background: #f8fafc;
      color: #1e293b;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px;
      box-sizing: border-box;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    .input-control:focus {
      outline: none;
      border-color: #fbbf24;
      background: #fff;
    }

    textarea.input-control {
      height: 90px;
      resize: none;
      line-height: 1.5;
    }

    /* 메인 생성 버튼 (귀여운 노란색 포인트) */
    .btn-submit {
      background: #fbbf24;
      color: #78350f;
      font-weight: 800;
      border: none;
      padding: 16px;
      border-radius: 16px;
      cursor: pointer;
      width: 100%;
      font-size: 1.1rem;
      box-shadow: 0 4px 0 #d97706;
      transition: all 0.1s;
    }

    .btn-submit:active {
      transform: translateY(4px);
      box-shadow: none;
    }

    /* 하단 결과 캔버스 */
    #canvas-area {
      flex: 1;
      padding: 24px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-y: auto;
      background-color: #f8fafc;
    }

    .status-text {
      font-size: 0.95rem;
      color: #64748b;
      text-align: center;
      line-height: 1.6;
      padding: 20px;
      background: #ffffff;
      border-radius: 16px;
      border: 2px dashed #cbd5e1;
      width: 100%;
      box-sizing: border-box;
    }

    .webtoon-card {
      width: 100%;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 16px;
      box-sizing: border-box;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .image-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #f1f5f9;
      border-radius: 12px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 명확한 모바일 다운로드 버튼 */
    .btn-download {
      background: #3b82f6;
      color: #ffffff;
      font-weight: 800;
      border: none;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
      box-shadow: 0 4px 0 #2563eb;
    }

    .btn-download:active {
      transform: translateY(4px);
      box-shadow: none;
    }

    .prompt-box {
      background: #f1f5f9;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      color: #475569;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-all;
      margin-top: 8px;
      border: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>

  <div id="main-container">
    <div id="control-panel">
      <div class="panel-header">
        <div class="panel-title">🎨 AI 귀염 웹툰 스튜디오</div>
        <button id="toggle-btn" class="btn-toggle-setup" onclick="toggleSetupSection()" style="display: none;">⚙️ 설정 펴기</button>
      </div>
      
      <div class="input-row">
        <div id="setup-section">
          <div class="input-group" style="margin-bottom: 16px;">
            <label for="api-key">🔑 Gemini API Key (무료 가능)</label>
            <input type="password" id="api-key" class="input-control" placeholder="AI Studio 키 입력">
          </div>

          <div class="input-group" style="margin-bottom: 16px;">
            <label for="ref-images">👥 주인공 캐릭터 이미지 (다중 선택 가능)</label>
            <input type="file" id="ref-images" class="input-control" accept="image/*" multiple>
            <small style="color: #64748b; font-size: 0.75rem; display: block; margin-top: 4px;">여러 캐릭터를 한 장면에 넣고 싶다면 파일을 여러 개 선택하세요!</small>
          </div>
        </div>

        <div class="input-group">
          <label for="scene-text">📝 만들고 싶은 에피소드 장면</label>
          <textarea id="scene-text" class="input-control" placeholder="예: 주인공 사각이와 친구들이 벚꽃 아래에서 솜사탕을 먹으며 웃는 따뜻한 장면"></textarea>
        </div>
      </div>

      <button class="btn-submit" onclick="startWebtoonPipeline()">✨ 일관성 만화 컷 그리기</button>
    </div>

    <div id="canvas-area">
      <div id="status-viewer" class="status-text">
        캐릭터 사진들을 넣고 시나리오를 작성한 뒤<br>
        <strong>[만화 컷 그리기]</strong> 버튼을 꾹 눌러주세요!
      </div>
      
      <div id="webtoon-result-card" class="webtoon-card" style="display: none;">
        <div class="image-container">
          <img id="result-img" src="" alt="AI 웹툰 생성 결과">
        </div>
        
        <button class="btn-download" onclick="downloadWebtoon()">
          ⬇️ 내 폰에 갤러리로 저장하기
        </button>

        <div style="font-size: 0.9rem; font-weight: 800; color: #334155; text-align: left;">🤖 구글 AI 프롬프트 기록 :</div>
        <div id="result-prompt" class="prompt-box"></div>
      </div>
    </div>
  </div>

  <script>
    window.onload = function() {
      const savedKey = localStorage.getItem('gemini_free_api_key');
      if (savedKey) {
        document.getElementById('api-key').value = savedKey;
      }
    };

    // 이미지 파일을 Base64로 정제하는 함수
    function fileToGenerativePart(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => {
          try {
            const base64Data = reader.result.split(',')[1];
            if (!base64Data) throw new Error("이미지 변환 실패");
            resolve({
              inlineData: { data: base64Data, mimeType: file.type }
            });
          } catch (e) {
            reject(e);
          }
        };
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
      });
    }

    function toggleSetupSection() {
      const setupSection = document.getElementById('setup-section');
      setupSection.style.display = (setupSection.style.display === "none") ? "block" : "none";
    }

    // 모바일 갤러리 다운로드 트리거 함수
    window.currentImageUrl = "";
    function downloadWebtoon() {
      if (!window.currentImageUrl) return;
      const a = document.createElement('a');
      a.href = window.currentImageUrl;
      a.download = `Webtoon_Cut_${new Date().getTime()}.jpg`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    async function startWebtoonPipeline() {
      const apiKeyInput = document.getElementById('api-key').value.trim();
      const fileInput = document.getElementById('ref-images');
      const sceneText = document.getElementById('scene-text').value.trim();
      const statusViewer = document.getElementById('status-viewer');
      const resultCard = document.getElementById('webtoon-result-card');
      const resultImg = document.getElementById('result-img');
      const resultPrompt = document.getElementById('result-prompt');
      
      const setupSection = document.getElementById('setup-section');
      const toggleBtn = document.getElementById('toggle-btn');

      if (!apiKeyInput) { alert("Gemini API Key를 입력해주세요!"); return; }
      if (fileInput.files.length === 0 || !sceneText) { alert("캐릭터 이미지와 장면 묘사를 모두 채워주세요!"); return; }

      localStorage.setItem('gemini_free_api_key', apiKeyInput);
      
      resultCard.style.display = "none";
      statusViewer.style.display = "block";
      statusViewer.innerHTML = "⏳ <strong>[1/2 단계]</strong> Gemini Pro가 다중 캐릭터들의 특징을 정밀하게 분석 중입니다...";

      try {
        // 1. 업로드된 모든 다중 이미지를 병렬로 처리
        const filesArray = Array.from(fileInput.files);
        const imageParts = await Promise.all(filesArray.map(fileToGenerativePart));
        
        // 2. Gemini 1.5 Pro를 활용한 프롬프트 추출 (텍스트 엔진)
        const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${apiKeyInput}`;
        
        const geminiPayload = {
          contents: [{
            parts: [
              ...imageParts, // 분석할 여러 캐릭터 이미지 투척
              { text: `당신은 프로 웹툰 작가입니다. 첨부된 ${filesArray.length}장의 레퍼런스 이미지들에 등장하는 캐릭터들의 고유한 외형, 스타일, 색감을 완벽히 파악하세요. 이를 바탕으로 다음 장면을 묘사하는 이미지 생성용 고해상도 영문 프롬프트(Webtoon, comic panel)를 단 한 문단으로 작성하세요. 캐릭터들의 디테일이 유지되어야 합니다. 장면: ${sceneText}` }
            ]
          }]
        };

        const geminiResponse = await fetch(geminiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(geminiPayload)
        });
        
        const geminiData = await geminiResponse.json();
        
        if (geminiData.error) throw new Error(`[Gemini 오류] ${geminiData.error.message}`);
        if (!geminiData.candidates) throw new Error("프롬프트 분석에 실패했습니다.");

        const optimizedPrompt = geminiData.candidates[0].content.parts[0].text.trim();
        
        // UI 정리
        setupSection.style.display = "none";
        toggleBtn.style.display = "block";

        statusViewer.innerHTML = "🎨 <strong>[2/2 단계]</strong> 구글 Imagen 3 AI가 분석된 프롬프트로 컷을 그리는 중입니다 (약 10초)...";

        // 3. 구글 Imagen 3 를 활용한 직접 이미지 생성 (이미지 엔진)
        const imagenUrl = `https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-001:predict?key=${apiKeyInput}`;
        
        const imagenPayload = {
          instances: [{ prompt: optimizedPrompt + ", flat color webtoon style, comic panel, masterpiece" }],
          parameters: { sampleCount: 1, aspectRatio: "1:1" }
        };

        const imgResponse = await fetch(imagenUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(imagenPayload)
        });

        const imgData = await imgResponse.json();

        if (imgData.error) throw new Error(`[Imagen 오류] ${imgData.error.message}`);
        if (!imgData.predictions || !imgData.predictions[0].bytesBase64Encoded) throw new Error("구글 Imagen 응답에 이미지가 없습니다.");

        // Base64를 렌더링 가능하게 조립
        const base64Img = imgData.predictions[0].bytesBase64Encoded;
        const objectURL = "data:image/jpeg;base64," + base64Img;
        window.currentImageUrl = objectURL; // 다운로드용 전역 변수 저장

        // 결과 화면 표출
        statusViewer.style.display = "none";
        resultCard.style.display = "block";
        resultImg.src = objectURL;
        resultPrompt.innerText = optimizedPrompt;

      } catch (error) {
        statusViewer.innerHTML = `<span style="color:#ef4444; font-weight:800;">❌ 에러 발생</span><br><br><small style="color:#64748b;">${error.message}</small>`;
      }
    }
  </script>
</body>
</html>
