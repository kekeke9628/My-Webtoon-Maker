<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 웹툰 제작실 - AI Webtoon Maker</title>
  
  <meta property="og:type" content="website">
  <meta property="og:title" content="나만의 웹툰 제작실">
  <meta property="og:description" content="Gemini AI로 일관성 있는 주인공 캐릭터와 에피소드 명랑 만화를 기획해보세요!">
  <meta property="og:image" content="https://ais-pre-dc2fkdlsxukleawti5ixu7-60107729179.asia-northeast1.run.app/icon.png">
  <meta property="og:url" content="https://ais-pre-dc2fkdlsxukleawti5ixu7-60107729179.asia-northeast1.run.app">

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0f0f11;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
    }

    #main-container {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #sidebar {
      width: 380px;
      min-width: 350px;
      height: 100%;
      background-color: #18181b;
      border-right: 1px solid #27272a;
      box-sizing: border-box;
      padding: 24px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      color: #ffffff;
    }

    #content-area {
      flex: 1;
      height: 100%;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #loader {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #121214;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #facc15;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: -0.03em;
    }

    .sub-text {
      font-size: 0.8rem;
      color: #a1a1aa;
      margin-top: 8px;
    }

    .panel-title {
      font-size: 1.25rem;
      font-weight: bold;
      color: #facc15;
      margin-top: 0;
      margin-bottom: 20px;
      border-bottom: 2px solid #27272a;
      padding-bottom: 10px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e4e4e7;
    }

    .input-control {
      width: 100%;
      background: #27272a;
      color: #fff;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      padding: 10px;
      box-sizing: border-box;
      font-size: 0.9rem;
    }

    textarea.input-control {
      height: 100px;
      resize: none;
    }

    .btn-submit {
      background: #facc15;
      color: #000;
      font-weight: bold;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-size: 0.95rem;
      transition: background 0.2s;
      margin-bottom: 10px;
    }

    .btn-submit:hover {
      background: #eab308;
    }

    .btn-drive {
      background: #4285F4;
      color: #fff;
      font-weight: bold;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-size: 0.9rem;
      transition: background 0.2s;
      display: none;
    }

    .btn-drive:hover {
      background: #357ae8;
    }

    #output-result {
      margin-top: 24px;
      padding: 16px;
      background: #27272a;
      border-radius: 6px;
      border: 1px solid #3f3f46;
      display: none;
    }

    .result-title {
      font-size: 0.9rem;
      font-weight: bold;
      color: #facc15;
      margin-bottom: 8px;
    }

    #prompt-text {
      color: #e4e4e7;
      font-family: monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      margin: 0;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <div class="loading-text">나만의 웹툰 제작실을 준비 중입니다...</div>
    <div class="sub-text">AI Studio Cloud Integration & Google Drive Sync</div>
  </div>

  <div id="main-container">
    
    <div id="sidebar">
      <div class="panel-title">🎨 캐릭터 일관성 제어</div>
      
      <div class="input-group">
        <label for="api-key">Gemini API Key</label>
        <input type="password" id="api-key" class="input-control" placeholder="AI Studio에서 발급받은 키">
      </div>

      <div class="input-group">
        <label for="google-client-id">Google Client ID (선택 - 드라이브 연동용)</label>
        <input type="text" id="google-client-id" class="input-control" placeholder="구글 클라우드 콘솔에서 발급받은 ID">
      </div>

      <div class="input-group">
        <label for="ref-image">1. 기준 캐릭터 레퍼런스 이미지</label>
        <input type="file" id="ref-image" class="input-control" accept="image/*">
      </div>

      <div class="input-group">
        <label for="scene-text">2. 새로 전개할 에피소드 상황</label>
        <textarea id="scene-text" class="input-control" placeholder="예: 주인공이 깜짝 놀라 커피를 쏟는 코믹한 장면"></textarea>
      </div>

      <button class="btn-submit" onclick="generateConsistentPrompt()">일관성 매칭 프롬프트 추출</button>
      <button id="drive-btn" class="btn-drive" onclick="saveToGoogleDrive()">구글 드라이브에 결과 저장</button>

      <div id="output-result">
        <div class="result-title">✨ 추출된 일관성 프롬프트</div>
        <p id="prompt-text"></p>
      </div>
    </div>

    <div id="content-area">
      <iframe 
        id="app-frame"
        src="https://ais-pre-dc2fkdlsxukleawti5ixu7-60107729179.asia-northeast1.run.app" 
        allow="camera; microphone; geolocation"
        onload="hideLoader()">
      </iframe>
    </div>

  </div>

  <script>
    let tokenClient;
    let accessToken = null;
    let lastGeneratedPrompt = "";

    function hideLoader() {
      const loader = document.getElementById('loader');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none'; }, 500);
      }
    }

    window.onload = function() {
      const savedKey = localStorage.getItem('gemini_free_api_key');
      if (savedKey) document.getElementById('api-key').value = savedKey;
      
      const savedClientID = localStorage.getItem('google_client_id');
      if (savedClientID) {
        document.getElementById('google-client-id').value = savedClientID;
        initGoogleAuth(savedClientID);
      }
    };

    document.getElementById('google-client-id').addEventListener('change', function(e) {
      const clientID = e.target.value.trim();
      localStorage.setItem('google_client_id', clientID);
      initGoogleAuth(clientID);
    });

    function initGoogleAuth(clientId) {
      if (!clientId || typeof google === 'undefined') return;
      try {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: clientId,
          scope: 'https://www.googleapis.com/auth/drive.file',
          callback: (tokenResponse) => {
            if (tokenResponse && tokenResponse.access_token) {
              accessToken = tokenResponse.access_token;
              uploadFileToDrive();
            }
          },
        });
      } catch (err) {
        console.error("Google Auth Init Error:", err);
      }
    }

    function fileToGenerativePart(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve({
          inlineData: { data: reader.result.split(',')[1], mimeType: file.type }
        });
        reader.readAsDataURL(file);
      });
    }

    async function generateConsistentPrompt() {
      const apiKeyInput = document.getElementById('api-key').value.trim();
      const fileInput = document.getElementById('ref-image');
      const sceneText = document.getElementById('scene-text').value.trim();
      const resultDiv = document.getElementById('output-result');
      const promptText = document.getElementById('prompt-text');
      const driveBtn = document.getElementById('drive-btn');

      if (!apiKeyInput) { alert("Gemini API Key를 입력해주세요."); return; }
      if (!fileInput.files[0] || !sceneText) { alert("이미지와 에피소드 상황을 모두 입력해주세요!"); return; }

      localStorage.setItem('gemini_free_api_key', apiKeyInput);
      promptText.innerText = "제미나이 프로가 이미지 스타일을 분석 중입니다...";
      resultDiv.style.display = "block";
      driveBtn.style.display = "none";

      try {
        const imagePart = await fileToGenerativePart(fileInput.files[0]);
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key=${apiKeyInput}`;
        
        const promptPayload = {
          contents: [{
            parts: [
              imagePart,
              { text: "당신은 웹툰 기획자입니다. 제공된 이미지 캐릭터의 핵심 스타일(선화, 채색, 외형)을 계승하여 다음 장면을 표현하는 이미지 생성용 영문 프롬프트를 작성하세요.\n\n장면: " + sceneText }
            ]
          }]
        };

        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(promptPayload)
        });
        
        const data = await response.json();
        if (data.candidates && data.candidates[0].content.parts[0].text) {
          lastGeneratedPrompt = data.candidates[0].content.parts[0].text;
          promptText.innerText = lastGeneratedPrompt;
          
          if (document.getElementById('google-client-id').value.trim()) {
            driveBtn.style.display = "block";
          }
        } else {
          promptText.innerText = "프롬프트 생성에 실패했습니다. API 응답을 확인하세요.";
        }
      } catch (error) {
        promptText.innerText = "오류 발생: " + error.message;
      }
    }

    function saveToGoogleDrive() {
      if (!accessToken) {
        if (tokenClient) {
          tokenClient.requestAccessToken({ prompt: 'consent' });
        } else {
          alert("Google Client ID가 올바르지 않거나 아직 초기화되지 않았습니다.");
        }
      } else {
        uploadFileToDrive();
      }
    }

    async function uploadFileToDrive() {
      const sceneText = document.getElementById('scene-text').value.trim();
      const filename = "Webtoon_Prompt_" + new Date().toISOString().slice(0,10) + ".txt";
      const fileContent = "[에피소드 장면]\n" + sceneText + "\n\n[추출된 영문 프롬프트]\n" + lastGeneratedPrompt;

      const metadata = {
        name: filename,
        mimeType: 'text/plain'
      };

      const formData = new FormData();
      formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
      formData.append('file', new Blob([fileContent], { type: 'text/plain' }));

      try {
        const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + accessToken },
          body: formData
        });
        if (response.ok) {
          alert('구글 드라이브에 프롬프트가 성공적으로 저장되었습니다!');
        } else {
          alert('드라이브 저장에 실패했습니다.');
        }
      } catch (err) {
        alert('에러 발생: ' + err.message);
      }
    }
  </script>
</body>
</html>
