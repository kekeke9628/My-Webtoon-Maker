<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 웹툰 제작실 - AI Webtoon Maker</title>
  
  <meta property="og:type" content="website">
  <meta property="og:title" content="나만의 웹툰 제작실">
  <meta property="og:description" content="Gemini AI로 일관성 있는 주인공 캐릭터와 에피소드 명랑 만화를 기획해보세요!">
  <meta property="og:image" content="https://ais-pre-dc2fkdlsxukleawti5ixu7-60107729179.asia-northeast1.run.app/icon.png">
  <meta property="og:url" content="https://ais-pre-dc2fkdlsxukleawti5ixu7-60107729179.asia-northeast1.run.app">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0f0f11;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column; /* 모바일 대응 레이아웃 상하 배치 */
    }

    #main-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    #sidebar {
      width: 100%;
      box-sizing: border-box;
      padding: 20px;
      background-color: #18181b;
      border-bottom: 1px solid #27272a;
      color: #ffffff;
    }

    #content-area {
      flex: 1;
      width: 100%;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .panel-title {
      font-size: 1.2rem;
      font-weight: bold;
      color: #facc15;
      margin: 0 0 15px 0;
    }

    .input-group {
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 5px;
      color: #e4e4e7;
    }

    .input-control {
      width: 100%;
      background: #27272a;
      color: #fff;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      padding: 8px;
      box-sizing: border-box;
      font-size: 0.85rem;
    }

    textarea.input-control {
      height: 60px;
      resize: none;
    }

    .btn-submit {
      background: #facc15;
      color: #000;
      font-weight: bold;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-size: 0.9rem;
    }

    #output-result {
      margin-top: 15px;
      padding: 12px;
      background: #27272a;
      border-radius: 6px;
      border: 1px solid #3f3f46;
      display: none;
    }

    .result-title {
      font-size: 0.85rem;
      font-weight: bold;
      color: #facc15;
      margin-bottom: 5px;
    }

    #prompt-text {
      color: #e4e4e7;
      font-family: monospace;
      font-size: 0.8rem;
      white-space: pre-wrap;
      margin: 0;
      word-break: break-all;
      user-select: all; /* 모바일에서 터치 시 전체 선택 편하게 설정 */
      -webkit-user-select: all;
    }
  </style>
</head>
<body>

  <div id="main-container">
    
    <div id="sidebar">
      <div class="panel-title">🎨 캐릭터 일관성 제어 (모바일)</div>
      
      <div class="input-group">
        <label for="api-key">Gemini API Key</label>
        <input type="password" id="api-key" class="input-control" placeholder="AI Studio에서 발급받은 키 입력">
      </div>

      <div class="input-group">
        <label for="ref-image">1. 캐릭터 레퍼런스 이미지 선택</label>
        <input type="file" id="ref-image" class="input-control" accept="image/*">
      </div>

      <div class="input-group">
        <label for="scene-text">2. 에피소드 상황</label>
        <textarea id="scene-text" class="input-control" placeholder="예: 주인공이 깜짝 놀라 커피를 쏟는 장면"></textarea>
      </div>

      <button class="btn-submit" onclick="generateConsistentPrompt()">일관성 프롬프트 추출</button>

      <div id="output-result">
        <div class="result-title">✨ 추출된 프롬프트 (길게 누르면 전체 선택 가능)</div>
        <p id="prompt-text"></p>
      </div>
    </div>

    <div id="content-area">
      <iframe 
        id="app-frame"
        src="https://ais-pre-dc2fkdlsxukleawti5ixu7-60107729179.asia-northeast1.run.app" 
        allow="camera; microphone; geolocation">
      </iframe>
    </div>

  </div>

  <script>
    window.onload = function() {
      const savedKey = localStorage.getItem('gemini_free_api_key');
      if (savedKey) document.getElementById('api-key').value = savedKey;
    };

    function fileToGenerativePart(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve({
          inlineData: { data: reader.result.split(',')[1], mimeType: file.type }
        });
        reader.readAsDataURL(file);
      });
    }

    async function generateConsistentPrompt() {
      const apiKeyInput = document.getElementById('api-key').value.trim();
      const fileInput = document.getElementById('ref-image');
      const sceneText = document.getElementById('scene-text').value.trim();
      const resultDiv = document.getElementById('output-result');
      const promptText = document.getElementById('prompt-text');

      if (!apiKeyInput) { alert("Gemini API Key를 입력해주세요."); return; }
      if (!fileInput.files[0] || !sceneText) { alert("이미지와 에피소드 상황을 모두 입력해주세요!"); return; }

      localStorage.setItem('gemini_free_api_key', apiKeyInput);
      promptText.innerText = "제미나이 AI가 스타일 분석 중입니다...";
      resultDiv.style.display = "block";

      try {
        const imagePart = await fileToGenerativePart(fileInput.files[0]);
        
        // 모바일 속도와 성공률을 위해 검증된 1.5-flash 모델 스트림 활용
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKeyInput}`;
        
        const promptPayload = {
          contents: [{
            parts: [
              imagePart,
              { text: "당신은 만화가입니다. 첨부된 이미지 속 캐릭터의 그림체, 외형, 고유 색감을 완벽히 계승하여 다음 상황을 묘사하는 이미지 생성용 상세 영어 프롬프트를 한 단락으로 짜주세요. 장면: " + sceneText }
            ]
          }]
        };

        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(promptPayload)
        });
        
        const data = await response.json();
        
        if (data.candidates && data.candidates[0].content.parts[0].text) {
          promptText.innerText = data.candidates[0].content.parts[0].text;
        } else if (data.error) {
          promptText.innerText = "구글 서버 에러: " + data.error.message;
        } else {
          promptText.innerText = "분석에 실패했습니다. API 키가 정상인지 확인하세요.";
        }
      } catch (error) {
        promptText.innerText = "통신 에러 발생: " + error.message;
      }
    }
  </script>
</body>
</html>
