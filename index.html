<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>나만의 귀여운 웹툰 제작실</title>
  
  <style>
    /* 워드프레스 스타일 모던/큐트 테마 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f8fafc; 
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #334155;
      display: flex;
      flex-direction: column;
    }

    #main-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      height: 100%;
      box-sizing: border-box;
      background-color: #ffffff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    #control-panel {
      width: 100%;
      box-sizing: border-box;
      padding: 24px;
      background-color: #ffffff;
      border-bottom: 2px dashed #e2e8f0;
      overflow-y: auto;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .panel-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #0f172a;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-toggle-setup {
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #cbd5e1;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .input-row {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #334155;
    }

    .input-control {
      width: 100%;
      background: #f8fafc;
      color: #1e293b;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px;
      box-sizing: border-box;
      font-size: 0.95rem;
    }

    .input-control:focus {
      outline: none;
      border-color: #fbbf24;
      background: #fff;
    }

    textarea.input-control {
      height: 80px;
      resize: none;
      line-height: 1.5;
    }

    /* 캐릭터 개별 입력 카드 스타일 */
    .character-card {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
    }
    
    .character-card-title {
      font-size: 0.95rem;
      font-weight: 800;
      color: #0f172a;
      margin-top: 0;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .char-input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-add-char {
      background: transparent;
      color: #3b82f6;
      border: 2px dashed #93c5fd;
      padding: 12px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-bottom: 16px;
    }
    
    .btn-suggest-episode {
      background: #ede9fe;
      color: #6d28d9;
      border: 1px solid #c4b5fd;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-submit {
      background: #fbbf24;
      color: #78350f;
      font-weight: 800;
      border: none;
      padding: 16px;
      border-radius: 16px;
      cursor: pointer;
      width: 100%;
      font-size: 1.1rem;
      box-shadow: 0 4px 0 #d97706;
    }

    .btn-submit:active {
      transform: translateY(4px);
      box-shadow: none;
    }

    #canvas-area {
      flex: 1;
      padding: 24px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-y: auto;
      background-color: #f8fafc;
    }

    .status-text {
      font-size: 0.95rem;
      color: #64748b;
      text-align: center;
      line-height: 1.6;
      padding: 20px;
      background: #ffffff;
      border-radius: 16px;
      border: 2px dashed #cbd5e1;
      width: 100%;
      box-sizing: border-box;
    }

    .webtoon-card {
      width: 100%;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 16px;
      box-sizing: border-box;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .image-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #f1f5f9;
      border-radius: 12px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn-download {
      background: #3b82f6;
      color: #ffffff;
      font-weight: 800;
      border: none;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 4px 0 #2563eb;
    }

    .prompt-box {
      background: #f1f5f9;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      color: #475569;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-all;
      margin-top: 8px;
      border: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>

  <div id="main-container">
    <div id="control-panel">
      <div class="panel-header">
        <div class="panel-title">🎨 AI 귀염 웹툰 스튜디오</div>
        <button id="toggle-btn" class="btn-toggle-setup" onclick="toggleSetupSection()" style="display: none;">⚙️ 설정 펴기</button>
      </div>
      
      <div class="input-row">
        <div id="setup-section">
          <div class="input-group" style="margin-bottom: 16px;">
            <label for="api-key">🔑 Gemini API Key</label>
            <input type="password" id="api-key" class="input-control" placeholder="AI Studio 키 입력">
          </div>

          <div id="character-list">
            <div class="character-card" data-index="1">
              <h4 class="character-card-title">👤 캐릭터 1</h4>
              <input type="file" class="input-control char-img" accept="image/*" style="margin-bottom: 8px;">
              <div class="char-input-grid">
                <input type="text" class="input-control char-name" placeholder="이름 (예: 사각이)" value="사각이">
                <input type="text" class="input-control char-traits" placeholder="특징 (예: 활발함)">
              </div>
            </div>
          </div>
          
          <button class="btn-add-char" onclick="addCharacter()">+ 캐릭터 추가하기</button>
        </div>

        <div class="input-group">
          <label for="scene-text">📝 만들고 싶은 에피소드 장면</label>
          <button class="btn-suggest-episode" onclick="suggestEpisode()">
            💡 AI에게 짧은 에피소드 아이디어 추천받기
          </button>
          <textarea id="scene-text" class="input-control" placeholder="직접 입력하거나 위 추천 버튼을 눌러보세요!"></textarea>
        </div>
      </div>

      <button class="btn-submit" onclick="startWebtoonPipeline()">✨ 일관성 만화 컷 그리기</button>
    </div>

    <div id="canvas-area">
      <div id="status-viewer" class="status-text">
        캐릭터 사진과 특징을 넣고 시나리오를 작성한 뒤<br>
        <strong>[만화 컷 그리기]</strong> 버튼을 꾹 눌러주세요!
      </div>
      
      <div id="webtoon-result-card" class="webtoon-card" style="display: none;">
        <div class="image-container">
          <img id="result-img" src="" alt="AI 웹툰 생성 결과">
        </div>
        
        <button class="btn-download" onclick="downloadWebtoon()">
          ⬇️ 내 폰에 갤러리로 저장하기
        </button>

        <div style="font-size: 0.9rem; font-weight: 800; color: #334155; text-align: left;">🤖 구글 AI 프롬프트 기록 :</div>
        <div id="result-prompt" class="prompt-box"></div>
      </div>
    </div>
  </div>

  <script>
    let charCount = 1;

    window.onload = function() {
      const savedKey = localStorage.getItem('gemini_free_api_key');
      if (savedKey) {
        document.getElementById('api-key').value = savedKey;
      }
    };

    function addCharacter() {
      charCount++;
      const list = document.getElementById('character-list');
      const card = document.createElement('div');
      card.className = 'character-card';
      card.setAttribute('data-index', charCount);
      card.innerHTML = `
        <h4 class="character-card-title">👤 캐릭터 ${charCount}</h4>
        <input type="file" class="input-control char-img" accept="image/*" style="margin-bottom: 8px;">
        <div class="char-input-grid">
          <input type="text" class="input-control char-name" placeholder="이름">
          <input type="text" class="input-control char-traits" placeholder="특징">
        </div>
      `;
      list.appendChild(card);
    }

    function toggleSetupSection() {
      const setupSection = document.getElementById('setup-section');
      setupSection.style.display = (setupSection.style.display === "none") ? "block" : "none";
    }

    window.currentImageUrl = "";
    function downloadWebtoon() {
      if (!window.currentImageUrl) return;
      const a = document.createElement('a');
      a.href = window.currentImageUrl;
      a.download = `Webtoon_Cut_${new Date().getTime()}.jpg`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function fileToGenerativePart(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => {
          try {
            const base64Data = reader.result.split(',')[1];
            if (!base64Data) throw new Error("이미지 변환 실패");
            resolve({ inlineData: { data: base64Data, mimeType: file.type } });
          } catch (e) {
            reject(e);
          }
        };
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
      });
    }

    function getCharactersData() {
      const cards = document.querySelectorAll('.character-card');
      let chars = [];
      cards.forEach(card => {
        const fileInput = card.querySelector('.char-img');
        const name = card.querySelector('.char-name').value.trim();
        const traits = card.querySelector('.char-traits').value.trim();
        
        if (name || traits || (fileInput.files && fileInput.files.length > 0)) {
          chars.push({
            file: (fileInput.files && fileInput.files.length > 0) ? fileInput.files[0] : null,
            name: name || "이름 미상",
            traits: traits || "특징 없음"
          });
        }
      });
      return chars;
    }

    // 💡 최신 활성 모델인 gemini-2.5-flash 로 완벽히 교체
    async function suggestEpisode() {
      const apiKeyInput = document.getElementById('api-key').value.trim();
      const chars = getCharactersData();
      
      if (!apiKeyInput) { alert("먼저 Gemini API Key를 입력해주세요!"); return; }
      if (chars.length === 0) { alert("최소 1명 이상의 캐릭터 이름과 특징을 적어주세요!"); return; }

      const sceneBox = document.getElementById('scene-text');
      sceneBox.value = "AI가 에피소드를 상상하고 있습니다... 잠시만 기다려주세요!";

      try {
        let charDescriptions = chars.map(c => `- ${c.name} (특징: ${c.traits})`).join("\\n");
        const promptText = `다음 캐릭터 설정을 바탕으로, 귀엽고 명랑한 1문장짜리 에피소드 상황을 1개 추천해줘. 구구절절한 설명 없이 상황만 짧게 출력해.\n\n[등장인물]\n${charDescriptions}`;

        // 최신 2.5 flash 모델 적용 (1.5 모델의 서비스 종료 에러 완벽 해결)
        const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKeyInput}`;
        
        const response = await fetch(geminiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        });
        
        const data = await response.json();
        if (data.error) throw new Error(data.error.message);
        
        sceneBox.value = data.candidates[0].content.parts[0].text.trim();
      } catch (error) {
        sceneBox.value = "";
        alert("에피소드 추천 실패: " + error.message);
      }
    }

    async function startWebtoonPipeline() {
      const apiKeyInput = document.getElementById('api-key').value.trim();
      const sceneText = document.getElementById('scene-text').value.trim();
      const statusViewer = document.getElementById('status-viewer');
      const resultCard = document.getElementById('webtoon-result-card');
      const resultImg = document.getElementById('result-img');
      const resultPrompt = document.getElementById('result-prompt');
      const setupSection = document.getElementById('setup-section');
      const toggleBtn = document.getElementById('toggle-btn');
      
      const chars = getCharactersData();
      const charsWithImages = chars.filter(c => c.file !== null);

      if (!apiKeyInput) { alert("Gemini API Key를 입력해주세요!"); return; }
      if (charsWithImages.length === 0) { alert("최소 1개 이상의 캐릭터 이미지를 첨부해주세요!"); return; }
      if (!sceneText) { alert("에피소드 장면 묘사를 적어주세요!"); return; }

      localStorage.setItem('gemini_free_api_key', apiKeyInput);
      
      setupSection.style.display = "none";
      toggleBtn.style.display = "block";
      
      resultCard.style.display = "none";
      statusViewer.style.display = "block";
      statusViewer.innerHTML = "⏳ <strong>[1/2 단계]</strong> 캐릭터 이미지와 특징을 분석 중입니다...";

      try {
        let partsForGemini = [];
        
        for (let i = 0; i < charsWithImages.length; i++) {
          const char = charsWithImages[i];
          const imagePart = await fileToGenerativePart(char.file);
          partsForGemini.push({ text: `[등장인물 ${i+1}] 이름: ${char.name}, 성격 및 외형 특징: ${char.traits}` });
          partsForGemini.push(imagePart);
        }

        partsForGemini.push({ text: `당신은 웹툰 작가입니다. 위 캐릭터들이 모두 등장하여 다음 에피소드를 연기하는 장면을 그리기 위한 '고해상도 영어 프롬프트(Webtoon, comic panel)'를 한 문단으로 작성하세요. 장면: ${sceneText}` });

        // 최신 2.5 flash 모델 적용
        const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKeyInput}`;
        
        const geminiPayload = { contents: [{ parts: partsForGemini }] };

        const geminiResponse = await fetch(geminiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(geminiPayload)
        });
        
        const geminiData = await geminiResponse.json();
        
        if (geminiData.error) throw new Error(`[Gemini 분석 오류] ${geminiData.error.message}`);
        if (!geminiData.candidates) throw new Error("프롬프트 분석에 실패했습니다.");

        const optimizedPrompt = geminiData.candidates[0].content.parts[0].text.trim();

        statusViewer.innerHTML = "🎨 <strong>[2/2 단계]</strong> 구글 Imagen 3 AI가 웹툰을 그리고 있습니다 (약 10초)...";

        // 최신 Imagen 3 정식 모델
        const imagenUrl = `https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-002:predict?key=${apiKeyInput}`;
        
        const imagenPayload = {
          instances: [{ prompt: optimizedPrompt + ", flat color webtoon style, comic panel, masterpiece, cute" }],
          parameters: { sampleCount: 1, aspectRatio: "1:1" }
        };

        const imgResponse = await fetch(imagenUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(imagenPayload)
        });

        const imgData = await imgResponse.json();

        if (imgData.error) throw new Error(`[Imagen 생성 오류] ${imgData.error.message}`);
        if (!imgData.predictions || !imgData.predictions[0].bytesBase64Encoded) throw new Error("이미지가 정상적으로 생성되지 않았습니다.");

        const base64Img = imgData.predictions[0].bytesBase64Encoded;
        const objectURL = "data:image/jpeg;base64," + base64Img;
        window.currentImageUrl = objectURL; 

        statusViewer.style.display = "none";
        resultCard.style.display = "block";
        resultImg.src = objectURL;
        resultPrompt.innerText = optimizedPrompt;

      } catch (error) {
        statusViewer.innerHTML = `<span style="color:#ef4444; font-weight:800;">❌ 에러 발생</span><br><br><small style="color:#64748b;">${error.message}</small>`;
        setupSection.style.display = "block";
        toggleBtn.style.display = "none";
      }
    }
  </script>
</body>
</html>
