<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자유로운 웹툰 스튜디오</title>
  <style>
    body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
    #container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; }
    .input-group { margin-bottom: 15px; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    
    #gallery { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
    .cut-item { border: 1px solid #ddd; padding: 10px; border-radius: 12px; }
    img { width: 100%; border-radius: 8px; }

    /* 오류 메시지 스타일 개선 */
    .error-box { 
      background: #fee2e2; 
      color: #991b1b; 
      padding: 20px; 
      border-radius: 12px; 
      border: 1px solid #f87171;
      font-size: 0.95rem; 
      white-space: pre-wrap; /* 줄바꿈 유지 */
      word-break: break-all;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div id="container">
  <h2>🎬 자유 컷 웹툰 스튜디오</h2>
  
  <div class="input-group">
    <input type="password" id="api-key" placeholder="Gemini API Key">
  </div>

  <div class="input-group">
    <label>원하는 컷 수 입력</label>
    <input type="number" id="cut-count" value="5" min="1" max="20">
  </div>

  <div class="input-group">
    <textarea id="story" rows="4" placeholder="웹툰의 전체 줄거리를 상세히 입력하세요."></textarea>
  </div>

  <button onclick="startWebtoon()">✨ 연속 생성 시작</button>

  <div id="gallery"></div>
</div>

<script>
async function startWebtoon() {
  const apiKey = document.getElementById('api-key').value;
  const story = document.getElementById('story').value;
  const cutCount = document.getElementById('cut-count').value;
  const gallery = document.getElementById('gallery');
  
  if(!apiKey || !story) { alert("API키와 줄거리를 확인해주세요."); return; }
  
  gallery.innerHTML = "⏳ 시나리오를 분석 중...";

  const prompt = `다음 이야기를 정확히 ${cutCount}개의 컷으로 분할해줘. 각 컷마다 상세한 이미지 생성 프롬프트(영어)를 작성해줘. JSON 형식으로 { "cuts": ["프롬프트1", "프롬프트2", ...] } 형태로만 응답해. 이야기: ${story}`;
  
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    
    if (!res.ok) throw new Error(`서버 응답 오류 (상태코드: ${res.status})`);
    
    const data = await res.json();
    if (!data.candidates) throw new Error("분석 결과가 없습니다. API 키를 확인하세요.");
    
    const resultText = data.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '');
    const json = JSON.parse(resultText);

    gallery.innerHTML = "";

    for (let i = 0; i < json.cuts.length; i++) {
      const cutDiv = document.createElement('div');
      cutDiv.className = "cut-item";
      cutDiv.innerHTML = `<p>컷 ${i+1} 생성 중...</p>`;
      gallery.appendChild(cutDiv);

      const prompt = json.cuts[i] + ", webtoon style, comic panel, cute";
      const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${Math.floor(Math.random()*10000)}`;
      
      cutDiv.innerHTML = `
        <p>컷 ${i+1}</p>
        <img src="${imgUrl}" alt="cut ${i+1}">
      `;
    }
  } catch (e) {
    // 개선된 에러 출력 영역
    gallery.innerHTML = `<div class="error-box"><strong>❌ 오류 발생</strong><br><br>${e.message}</div>`;
  }
}
</script>
</body>
</html>
