<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 웹툰 제작실 - AI Webtoon Maker</title>
  
  <meta property="og:type" content="website">
  <meta property="og:title" content="나만의 웹툰 제작실">
  <meta property="og:description" content="Gemini AI로 일관성 있는 주인공 캐릭터와 에피소드 명랑 만화를 기획해보세요!">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0f0f11;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ffffff;
      display: flex;
      flex-direction: column;
    }

    #main-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }

    #control-panel {
      width: 100%;
      box-sizing: border-box;
      padding: 20px;
      background-color: #18181b;
      border-bottom: 1px solid #27272a;
    }

    #canvas-area {
      flex: 1;
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0f0f11;
      overflow-y: auto;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .panel-title {
      font-size: 1.25rem;
      font-weight: bold;
      color: #facc15;
      margin: 0;
    }

    .btn-toggle-setup {
      background: #3f3f46;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .input-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 15px;
    }

    /* 토글 애니메이션을 위한 기본 스타일 */
    #setup-section {
      transition: all 0.3s ease-in-out;
      overflow: hidden;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #e4e4e7;
    }

    .input-control {
      width: 100%;
      background: #27272a;
      color: #fff;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      padding: 10px;
      box-sizing: border-box;
      font-size: 0.85rem;
    }

    textarea.input-control {
      height: 70px;
      resize: none;
    }

    .btn-submit {
      background: #facc15;
      color: #000;
      font-weight: bold;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-size: 0.95rem;
    }

    .webtoon-card {
      width: 100%;
      max-width: 400px;
      background: #18181b;
      border: 2px solid #3f3f46;
      border-radius: 12px;
      padding: 12px;
      box-sizing: border-box;
      text-align: center;
    }

    .image-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #27272a;
      border-radius: 8px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid #3f3f46;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .status-text {
      font-size: 0.9rem;
      color: #a1a1aa;
      padding: 20px;
      text-align: center;
      line-height: 1.5;
    }

    .prompt-box {
      background: #27272a;
      padding: 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      color: #facc15;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-all;
      margin-top: 8px;
      border: 1px solid #3f3f46;
    }
  </style>
</head>
<body>

  <div id="main-container">
    <div id="control-panel">
      <div class="panel-header">
        <div class="panel-title">🎨 AI 웹툰 제작실</div>
        <button id="toggle-btn" class="btn-toggle-setup" onclick="toggleSetupSection()" style="display: none;">⚙️ 캐릭터/API 변경</button>
      </div>
      
      <div class="input-row">
        <div id="setup-section">
          <div class="input-group" style="margin-bottom: 12px;">
            <label for="api-key">Gemini API Key</label>
            <input type="password" id="api-key" class="input-control" placeholder="AI Studio에서 발급받은 키 입력">
          </div>

          <div class="input-group" style="margin-bottom: 12px;">
            <label for="ref-image">1. 주인공 캐릭터 레퍼런스 파일</label>
            <input type="file" id="ref-image" class="input-control" accept="image/*">
          </div>
        </div>

        <div class="input-group">
          <label for="scene-text">2. 연출할 에피소드 장면 묘사</label>
          <textarea id="scene-text" class="input-control" placeholder="예: 주인공 사각이가 바나나 껍질을 밟고 넘어지는 장면"></textarea>
        </div>
      </div>

      <button class="btn-submit" onclick="startWebtoonPipeline()">일관성 만화 컷 생성하기</button>
    </div>

    <div id="canvas-area">
      <div id="status-viewer" class="status-text">
        상단에 레퍼런스 이미지와 에피소드 시나리오를 채운 후<br>
        <strong>[일관성 만화 컷 생성하기]</strong> 버튼을 누르면 이 자리에 컷이 렌더링됩니다.
      </div>
      
      <div id="webtoon-result-card" class="webtoon-card" style="display: none;">
        <div class="image-container">
          <img id="result-img" src="" alt="AI 웹툰 생성 결과">
        </div>
        <div style="font-size: 0.85rem; font-weight: bold; color: #fff; text-align: left;">🤖 반영된 일관성 프롬프트 :</div>
        <div id="result-prompt" class="prompt-box"></div>
      </div>
    </div>
  </div>

  <script>
    window.onload = function() {
      const savedKey = localStorage.getItem('gemini_free_api_key');
      if (savedKey) {
        document.getElementById('api-key').value = savedKey;
      }
    };

    function fileToGenerativePart(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve({
          inlineData: { data: reader.result.split(',')[1], mimeType: file.type }
        });
        reader.readAsDataURL(file);
      });
    }

    // 설정 영역 여닫는 헬퍼 기능
    function toggleSetupSection() {
      const setupSection = document.getElementById('setup-section');
      if (setupSection.style.display === "none") {
        setupSection.style.display = "block";
      } else {
        setupSection.style.display = "none";
      }
    }

    async function startWebtoonPipeline() {
      const apiKeyInput = document.getElementById('api-key').value.trim();
      const fileInput = document.getElementById('ref-image');
      const sceneText = document.getElementById('scene-text').value.trim();
      const statusViewer = document.getElementById('status-viewer');
      const resultCard = document.getElementById('webtoon-result-card');
      const resultImg = document.getElementById('result-img');
      const resultPrompt = document.getElementById('result-prompt');
      
      const setupSection = document.getElementById('setup-section');
      const toggleBtn = document.getElementById('toggle-btn');

      if (!apiKeyInput) { alert("Gemini API Key를 입력해주세요."); return; }
      if (!fileInput.files[0] || !sceneText) { alert("레퍼런스 이미지와 연출 장면을 모두 입력해 주세요!"); return; }

      localStorage.setItem('gemini_free_api_key', apiKeyInput);
      
      resultCard.style.display = "none";
      statusViewer.style.display = "block";
      statusViewer.innerHTML = "⏳ <strong>[1단계]</strong> Gemini AI가 캐릭터 스타일과 화풍을 연산하는 중...";

      try {
        const imagePart = await fileToGenerativePart(fileInput.files[0]);
        const geminiUrl = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKeyInput}`;
        
        const geminiPayload = {
          contents: [{
            parts: [
              imagePart,
              { text: "당신은 만화가입니다. 제공된 이미지 속 캐릭터의 외형 특징, 드로잉 스타일, 고유한 색감을 완벽하게 계승하세요. 이 화풍을 지킨 상태로 다음 장면을 묘사하는 이미지 생성용 상세 영어 프롬프트를 한 문단으로 작성하세요. 장면: " + sceneText }
            ]
          }]
        };

        const geminiResponse = await fetch(geminiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(geminiPayload)
        });
        
        const geminiData = await geminiResponse.json();
        
        if (geminiData.error) {
          throw new Error(`구글 서버 에러: ${geminiData.error.message}`);
        }
        
        if (!geminiData.candidates || !geminiData.candidates[0].content.parts[0].text) {
          throw new Error("스타일 분석 실패. API Key나 이미지가 정상인지 확인하세요.");
        }

        // 인증 및 분석에 성공했으므로 불필요한 입력 패널 숨기기 처리
        setupSection.style.display = "none";
        toggleBtn.style.display = "block"; // 언제든 바꿀 수 있게 전환 스위치 노출

        const optimizedPrompt = geminiData.candidates[0].content.parts[0].text.trim();
        
        statusViewer.innerHTML = "🚀 <strong>[2단계]</strong> 분석된 스타일을 바탕으로 웹툰 이미지 생성 중 (약 5~10초 소요)...";

        const txt2imgUrl = "https://api-inference.huggingface.co/models/Lykon/dreamshaper-8";
        
        const imgResponse = await fetch(txt2imgUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ inputs: optimizedPrompt + ", webtoon style, comic panel, flat color linear art" })
        });

        if (!imgResponse.ok) {
          throw new Error("이미지 서버 트래픽 혼잡. 잠시 후 다시 시도해 주세요.");
        }

        const imageBlob = await imgResponse.blob();
        const objectURL = URL.createObjectURL(imageBlob);

        statusViewer.style.display = "none";
        resultCard.style.display = "block";
        resultImg.src = objectURL;
        resultPrompt.innerText = optimizedPrompt;

      } catch (error) {
        statusViewer.innerHTML = `<span style="color:#ef4444; font-weight:bold;">❌ 오류 발생</span><br>${error.message}`;
      }
    }
  </script>
</body>
</html>
